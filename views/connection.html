<!doctype html>
<html lang="fr">
    <head>
    <meta charset="utf-8">
    <title>Unlock</title>
    <base href="/">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="./assets/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="./bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="./styles/global.css" rel="stylesheet" type="text/css">
    <link href="./styles/connection.css" rel="stylesheet" type="text/css">
    </head>
    <body>
      <header>
        <nav class="navbar fixed-top bg-lightgrey">
          <div class="container-fluid">
            <span class="navbar-brand">
                <img src="./assets/logo.svg" alt="logo" width="30" height="24" class="d-inline-block align-text-top">
                Unlock
            </span>
          </div>
        </nav>
      </header>
      <main class="bg-blue container">
        <div class="row justify-content-around">
          <!-- <div id="connection-section" class="text-center"> -->
          <!-- <ng-container *ngIf="getPlayer() === undefined; else elseBlockInstructions"> -->
          <form id="connection-form" class="connection col-lg-4" [formGroup]="connectionForm" (ngSubmit)="connection()">
            <h2>
              Rejoindre une partie
            </h2>
            <div class="form-group">
              <input formControlName="pseudo" type="text" class="form-control mb-3 mt-3" placeholder="Entrez votre pseudo" autofocus>
            </div>
            <div class="form-group">
              <fieldset
              class="mb-3 mt-3">
                <h4>
                  Choisir un avatar
                </h4>
                <label *ngFor="let nameImg of avatars;">
                  <input
                    formControlName="avatar"
                    type="radio"
                    name="avatar"
                    [value]="nameImg"
                  />
                  <img [src]="'./assets/avatar/'+nameImg"class="avatar">
                </label>
              </fieldset>
            </div>
            <div class="position-relative">
              <button class="btn bg-lightgrey" type="submit" [disabled]="isSubmitConnection">Jouer &raquo;</button>
              <div class="position-absolute w-100 white">
                  <div class="invisible">selectionnez un pseudo</div>
                  <div class="invisible">selectionnez un avatar</div>
              </div>
            </div>
          </form>
          <!-- </ng-container> -->
          <!-- <ng-template #elseBlockInstructions> -->
          <div id="instructions" class="connection col-lg-4 d-none">
            <div>{{chrono | getChrono}}</div>
            <h3>Equipe</h3>
            <div class="team">
              <app-player *ngFor="let player of team" [player]="player"></app-player>
            </div>
            <div class="btn-container" *ngIf="chrono === 0">
              <ng-container *ngIf="!getPlayer().start; else elseBlockWaiting">
                <button type="submit" class="btn btn-primary mr-1" (click)="start()">Valider</button>
                <button class="btn btn-secondary" (click)="back()">Retour</button>
              </ng-container>
              <ng-template #elseBlockWaiting>
                <div>
                  <h3>En attente des autres joueurs</h3>
                  <div class="spinner-border" role="status">
                    <span class="visually-hidden">loading...</span>
                  </div>
                </div>
              </ng-template>
            </div>
          </div>
        </div>
        <!-- </ng-template> -->
        <!-- </div> -->
      </main>
        <footer>
            <div class="container">
                <p>&copy; 2022 Jeremy Fouquet & Co.</p>
            </div>
        </footer>
        <!-- SCRIPTS -->
        <script src="./jquery/jquery.min.js"></script>
        <script src="./popper.js/umd/popper.min.js"></script>
        <script src="./bootstrap/js/bootstrap.min.js"></script>
        <script src="./controllers/connectionController.js"></script>
    </body>
</html>
